# 15 pods using the custom-scheduler
# Each has different CPU and RAM requests to demonstrate scheduling decisions.
# The image "gcr.io/google-containers/pause:3.2" is a tiny no-op container
# that just sleeps — perfect for simulating workloads in a demo.

---
apiVersion: v1
kind: Pod
metadata:
  name: pod-web-01
  namespace: default
  labels:
    app: demo
    tier: web
spec:
  schedulerName: custom-scheduler
  containers:
    - name: app
      image: gcr.io/google-containers/pause:3.2
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

