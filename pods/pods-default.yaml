# 5 pods using the DEFAULT Kubernetes scheduler (for comparison)
# These are identical in structure but use the default scheduler.

---
apiVersion: v1
kind: Pod
metadata:
  name: pod-default-01
  namespace: default
  labels:
    app: demo-default
spec:
  containers:
    - name: app
      image: gcr.io/google-containers/pause:3.2
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"

